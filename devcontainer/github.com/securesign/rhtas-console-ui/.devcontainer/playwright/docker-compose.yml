volumes:
  rhtas-console-e2e-claude-config:

services:
  rhtas-console-playwright:
    image: localhost/devcontainer-rhtas-console-e2e:latest
    build:
      dockerfile: ./Dockerfile
    security_opt:
      - "label=disable"
    userns_mode: "keep-id"
    network_mode: host
    extra_hosts:
      - "${HOSTNAME}:127.0.0.1"
    environment:
      CLAUDE_CODE_USE_VERTEX: "1"
      CLOUD_ML_REGION: ${CLOUD_ML_REGION:-us-east5}
      ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID}
    command: /bin/sh -c "while sleep 1000; do :; done"
    volumes:
      - ${RHTAS_CONSOLE_UI_PATH:-~/git/securesign/rhtas-console-ui}:/workspace:cached
      - rhtas-console-e2e-claude-config:/home/pwuser/.claude
      - ${HOME}/.config/gcloud:/home/pwuser/.config/gcloud:cached
